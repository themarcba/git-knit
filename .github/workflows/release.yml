name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm provenance + OIDC trusted publishing

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      # OIDC trusted publishing is auto-detected by npm >= 11.5.0
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # prepublishOnly runs typecheck + test + build.
      # Provenance is generated automatically (publishConfig.provenance = true).
      # No NODE_AUTH_TOKEN needed: auth comes from OIDC (trusted publisher).
      - name: Publish
        run: npm publish
